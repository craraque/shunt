<?xml version="1.0" encoding="UTF-8"?>
<!--
  Shunt app icon — compact (small sizes ≤64px). Same geometry as Icon.svg
  but drops the bloom + gloss + hairline (which are invisible at 16-64px)
  and thickens strokes for legibility.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#221913"/>
      <stop offset="1" stop-color="#0E0805"/>
    </linearGradient>
    <linearGradient id="rail" x1="14" y1="50" x2="86" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#FFB266" stop-opacity="0.4"/>
      <stop offset="0.5" stop-color="#FFB266" stop-opacity="1"/>
      <stop offset="1"   stop-color="#FF7A1A" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <rect width="100" height="100" rx="28" fill="url(#bg)"/>

  <!-- Rails + switch — thicker strokes for small-size legibility -->
  <line x1="14" y1="36" x2="86" y2="36"
        stroke="url(#rail)" stroke-width="11" stroke-linecap="round"/>
  <line x1="14" y1="64" x2="86" y2="64"
        stroke="url(#rail)" stroke-width="11" stroke-linecap="round"/>
  <path d="M 38 36 Q 50 50 62 64"
        stroke="url(#rail)" stroke-width="11" stroke-linecap="round" fill="none"/>

  <!-- Junction nodes (signal color), no specular at small sizes -->
  <circle cx="38" cy="36" r="5.5" fill="#7CF3A8"/>
  <circle cx="62" cy="64" r="5.5" fill="#7CF3A8"/>
</svg>
