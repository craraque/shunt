<?xml version="1.0" encoding="UTF-8"?>
<!--
  Shunt app icon — Filament theme (default).
  Geometry per design-handoff 2026-04-27 (100×100 canonical viewBox).
  Two parallel rails + diagonal switch link, glass treatment.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 100 100">
  <defs>
    <!-- Chassis: corner-to-corner Filament bg gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#221913"/>
      <stop offset="1" stop-color="#0E0805"/>
    </linearGradient>

    <!-- Rail/switch: horizontal accent gradient (40% → 100% → 40%) -->
    <linearGradient id="rail" x1="14" y1="50" x2="86" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#FFB266" stop-opacity="0.4"/>
      <stop offset="0.5" stop-color="#FFB266" stop-opacity="1"/>
      <stop offset="1"   stop-color="#FF7A1A" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Top gloss: radial highlight upper-left -->
    <radialGradient id="gloss" cx="0.32" cy="0.18" r="0.7">
      <stop offset="0"   stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="1"   stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Bloom blur filter (4px gaussian) -->
    <filter id="bloomBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- 1. Squircle chassis -->
  <rect width="100" height="100" rx="28" fill="url(#bg)"/>

  <!-- 2. Bloom — accent ellipse behind the rails, in the switch zone -->
  <ellipse cx="50" cy="50" rx="34" ry="14"
           fill="#FFB266" fill-opacity="0.22" filter="url(#bloomBlur)"/>

  <!-- 3a. Three colored strokes (rails + switch) -->
  <line x1="14" y1="36" x2="86" y2="36"
        stroke="url(#rail)" stroke-width="9" stroke-linecap="round"/>
  <line x1="14" y1="64" x2="86" y2="64"
        stroke="url(#rail)" stroke-width="9" stroke-linecap="round"/>
  <path d="M 38 36 Q 50 50 62 64"
        stroke="url(#rail)" stroke-width="9" stroke-linecap="round" fill="none"/>

  <!-- 3b. Inner glass highlights — width 1.8, white 55% -->
  <line x1="14" y1="36" x2="86" y2="36"
        stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="14" y1="64" x2="86" y2="64"
        stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M 38 36 Q 50 50 62 64"
        stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- 4. Junction nodes (signal color) + specular highlights -->
  <circle cx="38" cy="36" r="4.5" fill="#7CF3A8"/>
  <circle cx="36.8" cy="34.8" r="1.4" fill="#FFFFFF" fill-opacity="0.9"/>
  <circle cx="62" cy="64" r="4.5" fill="#7CF3A8"/>
  <circle cx="60.8" cy="62.8" r="1.4" fill="#FFFFFF" fill-opacity="0.9"/>

  <!-- 5. Top gloss — painted on top of everything -->
  <rect width="100" height="100" rx="28" fill="url(#gloss)"/>

  <!-- 6. Chassis hairline — sealed edge -->
  <rect x="0.5" y="0.5" width="99" height="99" rx="27.5"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="0.5"/>
</svg>
